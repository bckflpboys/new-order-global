<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Order Global - Settings</title>

</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="../icons/logo.png" alt="Logo" class="sidebar-logo">
      <div class="sidebar-title">New Order <span>Global</span></div>
    </div>
    <nav class="sidebar-nav">

      <a href="../builder/builder.html" class="nav-link"><span>⚡</span> AI Builder</a>

        <label>Extension Status</label>
        <div style="padding: 10px; background: rgba(0, 212, 170, 0.1); border: 1px solid rgba(0, 212, 170, 0.2); border-radius: 8px; color: var(--success); font-size: 13px;">
          ✅ Connected to local extension runtime
        </div>
      </div>
      <button class="btn-primary" id="btn-logout" style="background: var(--danger); margin-top: 10px;">Sign Out</button>
