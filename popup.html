<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Public+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           Alexandria Editorial Theme · Red Edition
           ============================================ */
        :root {
            /* Surface tiers — tonal layering, no borders */
            --background: #ecebec;
            --surface: #ecebec;
            --surface-bright: #ffffff;
            --surface-container-lowest: #ffffff;
            --surface-container-low: #e4e2e3;
            --surface-container: #d8d6d7;
            --surface-container-high: #cdcbcc;
            --surface-container-highest: #c2c0c1;
            --surface-dim: #b6b4b5;
            --surface-variant: #cdcbcc;

            /* Text */
            --on-surface: #1b1c1d;
            --on-surface-variant: #434653;
            --on-surface-muted: #737784;
            --inverse-surface: #303031;
            --inverse-on-surface: #f2f0f1;

            /* Primary — Red */
            --primary: #b8341c;
            --primary-container: #d94734;
            --on-primary: #ffffff;
            --on-primary-container: #fde7e3;
            --primary-fixed: #ffdad3;
            --primary-fixed-dim: #ffb4a3;
            --inverse-primary: #ffb4a3;

            /* Tertiary — archival gold */
            --tertiary: #6d5e00;
            --tertiary-container: #bfab49;
            --on-tertiary: #ffffff;
            --on-tertiary-container: #4a3f00;

            /* Status */
            --success: #2e7d4f;
            --warning: #8a6d00;
            --danger: #ba1a1a;
            --on-danger: #ffffff;
            --error-container: #ffdad6;
            --on-error-container: #93000a;

            /* Ghost border (15% opacity) */
            --ghost-border: rgba(60, 64, 75, 0.32);
            --ghost-border-strong: rgba(60, 64, 75, 0.5);

            /* Radii */
            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 999px;

            /* Diffused shadows */
            --shadow-xs: 0 1px 2px rgba(27, 28, 29, 0.08);
            --shadow-sm: 0 2px 10px rgba(27, 28, 29, 0.10);
            --shadow-md: 0 8px 28px rgba(27, 28, 29, 0.14);
            --shadow-lg: 0 24px 48px rgba(27, 28, 29, 0.20);

            /* Fonts */
            --font-headline: 'Noto Serif', Georgia, 'Times New Roman', serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-label: 'Public Sans', 'Inter', sans-serif;

            /* Legacy aliases for existing popup styles */
            --bg-base: var(--background);
            --bg-card: var(--surface-container-lowest);
            --accent-red: var(--primary);
            --accent-black: var(--on-surface);
            --text-main: var(--on-surface);
            --text-muted: var(--on-surface-muted);
            --border: var(--ghost-border);
            --shadow: var(--shadow-sm);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            font-family: var(--font-body);
            background: var(--background);
            color: var(--on-surface);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 30% -20%, rgba(184, 52, 28, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 120%, rgba(109, 94, 0, 0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Vertical Slider Container */
        .vertical-container {
            display: flex;
            flex-direction: column;
            height: 200%;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateY(-50%);
        }

        .v-screen {
            height: 50%;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Navbar */
        .top-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: var(--surface-container-low);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--ghost-border);
            z-index: 10;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--on-surface-variant);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--surface-container);
            color: var(--primary);
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(184, 52, 28, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(184, 52, 28, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(184, 52, 28, 0); }
        }

        .notification-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        .logo-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            padding: 0;
            border-radius: var(--radius-md);
            background: transparent;
            box-shadow: none;
            flex-shrink: 0;
        }
        .logo-pill img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Horizontal Carousel Container */
        .screens-container {
            flex: 1;
            display: flex;
            width: 300%;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateX(-33.333%);
            min-height: 0;
        }

        .screen {
            width: 33.333%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
        }

        /* Styling for content items */
        .screen-title {
            font-family: var(--font-headline);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--on-surface);
        }

        .screen-title svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        .notification-item {
            padding: 14px;
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-lg);
            margin-bottom: 8px;
            display: flex;
            gap: 12px;
            box-shadow: var(--shadow-xs);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .notification-item:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .notification-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-md);
            background: var(--surface-container-high);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        .notification-title {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
            color: var(--on-surface);
        }

        .notification-text {
            font-size: 12px;
            color: var(--on-surface-muted);
            line-height: 1.5;
        }

        .notification-item {
            position: relative;
        }

        .dismiss-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--surface-container);
            color: var(--on-surface-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
            opacity: 0;
        }

        .notification-item:hover .dismiss-btn {
            opacity: 1;
        }

        .dismiss-btn:hover {
            background: var(--error-container);
            color: var(--on-error-container);
        }

        .dismiss-btn svg {
            width: 14px;
            height: 14px;
        }

        .clear-all-btn {
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--on-surface-muted);
            background: var(--surface-container);
            border: 1px solid var(--ghost-border);
            padding: 6px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .clear-all-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--on-primary);
        }

        .main-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }

        .agent-action-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            border: 1px solid var(--primary);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .agent-action-card:hover {
            background: var(--inverse-surface);
            border-color: var(--inverse-surface);
            transform: translateY(-1px);
        }

        .agent-action-card svg {
            color: var(--on-primary);
            width: 20px;
            height: 20px;
        }

        .agent-action-card span {
            font-family: var(--font-label);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--on-primary);
        }

        .action-card {
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-lg);
            padding: 14px 8px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
            box-shadow: var(--shadow-xs);
        }

        .action-card:hover, .action-card.active {
            transform: translateY(-1px);
            border-color: var(--primary);
            background: var(--surface-container-low);
        }

        .action-card svg {
            color: var(--on-surface-variant);
            width: 22px;
            height: 22px;
            margin-bottom: 8px;
            transition: color 0.2s ease;
        }

        .action-card:hover svg, .action-card.active svg {
            color: var(--primary);
        }

        .action-card span {
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--on-surface);
            display: block;
        }

        .action-card.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            border-color: var(--primary);
            color: var(--on-primary);
        }

        .action-card.primary svg {
            color: var(--on-primary);
        }

        .action-card.primary span {
            color: var(--on-primary);
        }

        .action-card.primary:hover {
            background: var(--inverse-surface);
            border-color: var(--inverse-surface);
        }

        .nav-btn.active {
            color: var(--primary);
            background: var(--surface-container);
        }

        .tool-card {
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: var(--shadow-xs);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .tool-card:hover {
            border-color: var(--primary);
            background: var(--surface-container-low);
            transform: translateY(-1px);
        }

        .tool-name {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 14px;
            color: var(--on-surface);
            margin-bottom: 2px;
        }

        .tool-desc {
            font-size: 12px;
            color: var(--on-surface-muted);
        }

        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--surface-container-high);
            border-radius: var(--radius-full);
            transition: background 0.3s ease;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: var(--surface-bright);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-xs);
        }

        input:checked+.slider {
            background: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .btn-outline {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--ghost-border-strong);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--on-surface);
            font-family: var(--font-label);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .btn-outline:hover {
            background: var(--inverse-surface);
            color: var(--inverse-on-surface);
            border-color: var(--inverse-surface);
        }

        #btn-yt-settings {
            border-color: var(--primary);
            color: var(--primary);
        }

        #btn-yt-settings:hover {
            background: var(--primary);
            color: var(--on-primary);
            border-color: var(--primary);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface-container-highest);
            border-radius: var(--radius-full);
            border: 2px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--surface-dim);
            background-clip: content-box;
        }

        /* === Run Controls === */
        .tool-card-enhanced {
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-xs);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .tool-card-enhanced:hover {
            border-color: var(--primary);
            background: var(--surface-container-low);
            transform: translateY(-1px);
        }

        .tool-card-enhanced.is-running {
            border-color: rgba(46, 125, 79, 0.35);
            background: rgba(46, 125, 79, 0.03);
        }

        .tool-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .tool-card-info {
            flex: 1;
            min-width: 0;
        }

        .tool-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .tool-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--surface-container-highest);
            transition: background 0.3s ease;
        }

        .tool-status-dot.running {
            background: var(--success);
            box-shadow: 0 0 6px rgba(46, 125, 79, 0.5);
            animation: pulse-green 1.8s infinite;
        }

        .tool-status-dot.auto {
            background: var(--primary-container);
            box-shadow: 0 0 6px rgba(217, 71, 52, 0.4);
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(46,125,79,0.5); }
            70% { box-shadow: 0 0 0 5px rgba(46,125,79,0); }
            100% { box-shadow: 0 0 0 0 rgba(46,125,79,0); }
        }

        .tool-card-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .run-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
            padding: 0;
        }

        .run-btn.play {
            background: var(--primary);
            color: var(--on-primary);
        }

        .run-btn.play:hover {
            background: var(--primary-container);
            transform: scale(1.05);
        }

        .run-btn.stop {
            background: var(--surface-container);
            color: var(--on-surface-variant);
        }

        .run-btn.stop:hover {
            background: var(--error-container);
            color: var(--on-error-container);
        }

        .run-btn svg {
            width: 16px;
            height: 16px;
        }

        .run-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--surface-container-high);
            color: var(--on-surface-muted);
        }

        .run-btn:disabled:hover {
            background: var(--surface-container-high);
            color: var(--on-surface-muted);
            transform: none;
        }

        .tool-card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--ghost-border);
        }

        .run-timer {
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            font-variant-numeric: tabular-nums;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .run-timer.visible {
            opacity: 1;
        }

        .run-timer svg {
            width: 12px;
            height: 12px;
        }

        .tool-tag {
            font-family: var(--font-label);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: var(--radius-full);
        }

        .tool-tag.built-in {
            background: rgba(184, 52, 28, 0.08);
            color: var(--primary);
            border: 1px solid rgba(184, 52, 28, 0.2);
        }

        .tool-tag.auto-run {
            background: rgba(109, 94, 0, 0.1);
            color: var(--tertiary);
            border: 1px solid rgba(109, 94, 0, 0.2);
        }

        .tool-tag.manual {
            background: var(--surface-container);
            color: var(--on-surface-muted);
            border: 1px solid var(--ghost-border);
        }

        /* === Toast Notification === */
        .popup-toast-container {
            position: fixed;
            top: 56px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .popup-toast {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: var(--inverse-surface);
            color: var(--inverse-on-surface);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            animation: toastSlideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition: all 0.3s ease;
        }

        .popup-toast.toast-success {
            background: var(--inverse-surface);
            border-left: 3px solid var(--success);
        }

        .popup-toast.toast-info {
            background: var(--inverse-surface);
            border-left: 3px solid var(--primary-container);
        }

        .popup-toast.toast-warning {
            background: var(--inverse-surface);
            border-left: 3px solid var(--tertiary);
        }

        .popup-toast-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .popup-toast.exiting {
            animation: toastSlideOut 0.3s ease forwards;
        }

        @keyframes toastSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes toastSlideOut {
            to { transform: translateY(-20px); opacity: 0; }
        }

        /* === Notification Badge (counter) === */
        .notification-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            background: var(--primary);
            color: var(--on-primary);
            font-family: var(--font-label);
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            line-height: 1;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .notification-badge.visible {
            transform: scale(1);
        }

        /* === History Card === */
        .history-card {
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: var(--shadow-xs);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-card:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .history-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-primary);
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: var(--shadow-xs);
        }

        .history-title-group {
            flex: 1;
            min-width: 0;
        }

        .history-title {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 14px;
            color: var(--on-surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .history-date {
            font-family: var(--font-label);
            font-size: 11px;
            color: var(--on-surface-muted);
            font-weight: 500;
        }

        .history-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid var(--ghost-border);
        }

        .history-pill {
            background: var(--surface-container);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--on-surface-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--ghost-border);
        }

        .history-pill svg {
            width: 12px;
            height: 12px;
            color: var(--primary);
        }

        /* === Empty State === */
        .empty-tools-msg {
            padding: 20px;
            text-align: center;
            color: var(--on-surface-muted);
            font-family: var(--font-body);
            font-size: 13px;
            line-height: 1.6;
        }

        .empty-tools-msg strong {
            color: var(--primary);
            font-weight: 600;
        }
        /* === Inner Tab Switcher (Tools / Agent Monitor) === */
        .inner-tab-bar {
            margin-bottom: 18px;
            position: sticky;
            top: -24px;
            z-index: 10;
            background: var(--surface-container-low);
            margin-left: -24px;
            margin-right: -24px;
            padding: 12px 24px 0;
        }

        .inner-tab-track {
            display: flex;
            background: var(--surface-container);
            border-radius: 14px;
            padding: 4px;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.12);
            border: 1px solid var(--ghost-border);
            overflow: hidden;
        }

        .inner-tab-pill {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            width: calc(50% - 4px);
            background: var(--surface-container-highest, #2a2a2a);
            border-radius: 10px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.22), 0 0 0 1px rgba(255,255,255,0.06);
            pointer-events: none;
        }

        .inner-tab-track.monitor-active .inner-tab-pill {
            transform: translateX(calc(100% + 0px));
        }

        .inner-tab-btn {
            flex: 1;
            position: relative;
            z-index: 1;
            background: transparent;
            border: none;
            padding: 9px 12px;
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--on-surface-muted);
            cursor: pointer;
            border-radius: 10px;
            transition: color 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .inner-tab-btn.active {
            color: var(--on-surface);
        }

        .inner-tab-btn svg {
            width: 13px;
            height: 13px;
            opacity: 0.6;
            transition: opacity 0.25s ease;
        }

        .inner-tab-btn.active svg {
            opacity: 1;
        }

        /* Status dot on Monitor tab when running */
        .monitor-tab-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
            display: none;
        }

        .monitor-tab-dot.visible {
            display: block;
            animation: pulse-green 1.8s infinite;
        }

        /* Inner panels that slide */
        .inner-panels-wrap {
            overflow: hidden;
            position: relative;
        }

        .inner-panels-track {
            display: flex;
            width: 200%;
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .inner-panel {
            width: 50%;
            min-width: 0;
        }

        .inner-panels-track.show-monitor {
            transform: translateX(-50%);
        }

        /* === Agent Monitor === */
        .agent-status-card {
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-xs);
        }

        .agent-status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .agent-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: var(--radius-full);
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .agent-status-badge.idle {
            background: var(--surface-container);
            color: var(--on-surface-muted);
            border: 1px solid var(--ghost-border);
        }

        .agent-status-badge.running {
            background: rgba(46, 125, 79, 0.1);
            color: var(--success);
            border: 1px solid rgba(46, 125, 79, 0.25);
        }

        .agent-status-badge.awaiting {
            background: rgba(109, 94, 0, 0.1);
            color: var(--tertiary);
            border: 1px solid rgba(109, 94, 0, 0.25);
        }

        .agent-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-status-badge.running .agent-status-dot {
            background: var(--success);
            box-shadow: 0 0 0 0 rgba(46, 125, 79, 0.4);
            animation: pulse-green 1.8s infinite;
        }

        .agent-status-badge.idle .agent-status-dot {
            background: var(--on-surface-muted);
        }

        .agent-status-badge.awaiting .agent-status-dot {
            background: var(--tertiary);
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(109, 94, 0, 0.5); }
            70% { box-shadow: 0 0 0 5px rgba(109, 94, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(109, 94, 0, 0); }
        }

        .monitor-meta {
            font-size: 11px;
            color: var(--on-surface-muted);
            line-height: 1.6;
        }

        .monitor-meta strong {
            color: var(--on-surface-variant);
            font-weight: 600;
        }

        .monitor-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .monitor-btn {
            flex: 1;
            padding: 9px;
            border-radius: var(--radius-md);
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            border: 1px solid var(--ghost-border-strong);
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .monitor-btn.open-agent {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            color: var(--on-primary);
            border-color: var(--primary);
        }

        .monitor-btn.open-agent:hover {
            background: var(--inverse-surface);
            border-color: var(--inverse-surface);
        }

        .monitor-btn.stop-agent {
            background: transparent;
            color: var(--danger);
            border-color: rgba(186, 26, 26, 0.3);
        }

        .monitor-btn.stop-agent:hover {
            background: var(--error-container);
            color: var(--on-error-container);
            border-color: var(--danger);
        }

        .monitor-btn.stop-agent:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .step-feed {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xs);
            animation: stepIn 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes stepIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-icon {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: var(--surface-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .step-item.ok .step-icon { background: rgba(46, 125, 79, 0.08); }
        .step-item.err .step-icon { background: rgba(186, 26, 26, 0.08); }

        .step-body {
            flex: 1;
            min-width: 0;
        }

        .step-action {
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .step-summary {
            font-size: 12px;
            color: var(--on-surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .step-meta {
            font-size: 10px;
            color: var(--on-surface-muted);
            margin-top: 2px;
        }

        .step-err-text {
            font-size: 10px;
            color: var(--danger);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .monitor-section-title {
            font-family: var(--font-label);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--on-surface-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .monitor-clear-btn {
            background: transparent;
            border: none;
            font-family: var(--font-label);
            font-size: 10px;
            font-weight: 600;
            color: var(--on-surface-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .monitor-clear-btn:hover {
            background: var(--surface-container);
            color: var(--primary);
        }

        .empty-monitor-msg {
            padding: 32px 16px;
            text-align: center;
            color: var(--on-surface-muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .empty-monitor-msg .em-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
