name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Permissions needed by contributor-assistant/github-action to write
# signatures to a signatures branch and comment on PRs.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OPTIONAL: use a Personal Access Token with `repo` scope if you
          # want to store signatures in a *different* private repo.
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          # Path to the CLA document on the default branch.
          path-to-document: "https://github.com/OWNER/REPO/blob/main/CLA.md"

          # Where to store the list of people who have signed.
          # A JSON file on a dedicated branch is the standard pattern.
          branch: "cla-signatures"
          path-to-signatures: "signatures/v1/cla.json"

          # Exact phrase contributors must comment to sign.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: |
            Thanks for your contribution! Before we can merge it, we need you to
            sign our [Contributor License Agreement](https://github.com/bckflpboys/new-order-global/blob/main/CLA.md).
            
            It's quick — just reply to this PR with the following exact line:
            
            > I have read the CLA Document and I hereby sign the CLA
            
            This gives us the right to relicense your contribution under future
            versions of the Global Executive Source-Available License and/or a
            paid commercial license. Thank you!
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"

          # Bots and maintainers that never need to sign.
          allowlist: bot*,dependabot[bot],renovate[bot],32dOneLABS

          # Re-check every time the PR is updated.
          lock-pullrequest-aftermerge: false
